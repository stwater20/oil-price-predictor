name: Update oil price data

on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch latest data & prediction
        run: node fetch-data.mjs
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json history.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: weekly data & prediction update"
            git push
          fi
